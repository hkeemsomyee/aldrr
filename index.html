<html lang="ar" dir="rtl">

    <meta charset="UTF-8">

    <title>الدرر البهية والجواهر السنية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2a3a;
            --accent: #c5a059;
            --bg: #f9f7f2;
            --white: #ffffff;
        }

        body {
            font-family: 'Amiri', serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--primary);
            line-height: 1.8;
        }

        header {
            background-color: var(--primary);
            color: var(--accent);
            text-align: center;
            padding: 50px 20px;
            border-bottom: 5px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        header h1 { font-family: 'Aref Ruqaa', serif; margin: 0; font-size: clamp(1.8rem, 5vw, 3rem); }
        header p { color: #fff; font-size: 1.2rem; margin-top: 10px; }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .prayer-card {
            background: var(--white);
            border-radius: 15px;
            padding: 35px;
            margin-bottom: 60px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            border: 1px solid #e8e1d0;
            transition: transform 0.3s ease;
        }

        .prayer-card:hover { transform: translateY(-5px); }

        .title-box {
            text-align: center;
            margin-bottom: 25px;
        }

        .prayer-title {
            color: var(--accent);
            font-size: 1.7rem;
            font-weight: bold;
            display: inline-block;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 5px;
        }

        .prayer-text {
            font-size: 1.45rem;
            text-align: justify;
            background: #fffdf9;
            padding: 25px;
            border-right: 5px solid var(--accent);
            border-radius: 5px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }

        .image-container {
            text-align: center;
        }

        .prayer-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 2px solid #ddd;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        footer {
            background: var(--primary);
            color: var(--accent);
            text-align: center;
            padding: 40px 20px;
            margin-top: 80px;
        }

        /* تحسينات للجوال */
        @media (max-width: 600px) {
            .prayer-card { padding: 20px; }
            .prayer-text { font-size: 1.2rem; padding: 15px; }
        }
    </style>
</head>

<script>
    const prayers = [
        { t: "1. صلاة (مقتضى الكمالات في الذات المحمدية)", n: "﴿ الصَّلاةُ الأُولَی ﴾: اللَّهُمَّ صَلِّ بِمُقْتَضَى مُطْلَقِ كَمَالَات ۞ ومعاني وَمَعْنَوِيَّاتِ ۞ وَلَوَازِمِ وَمُقْتَضَيَاتِ ۞ بِسْمِ الله الرَّحْمَنِ الرَّحِيمِ ۞ عَلَى سَيِّدِنَا مُحَمَّدٍ الْبَرِّ المَبَرِّ الرَّؤُوفِ الرَّحِيمِ ۞ ذِي الْخَلْقِ الْجَمِيلِ وَالْخُلُقِ الْعَظِيمِ ۞ وَالنُّورِ الْهَادِى إِلَى الصِّرَاطِ الْمُسْتَقِيمِ ۞ وَالصَّابِرِ الْمُجَاهِدِ وَالْمُرْشِدِ الْحَكِيمِ ۞ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَا يَا الله يارحمَن يارحيم." },
        { t: "2. صلاة (عظيم الجاه في سرّ الله)", n: "﴿ الصَّلاَة الثَّانِيَة ﴾: اللَّهُمَّ صَلِّ بِمُقْتَضَى مُطْلَقِ كَمَالَات ۞ ومعاني وَمَعْنَوِيَّاتِ ۞ وَلَوَازِمِ وَمُقْتَضَيَاتِ ۞ إسْمك الْأعَزِّ الأَجَلِّ الذَّاتِيِّ بِعينِهِ وَمَعْنَاهُ ۞ وَذَلِكَ(اللهُ)الْإلَهُ الْوَاحِدُ مُقْتَضَاهُ ۞ عَلَى سَيِّدِنَا مُحَمَّدٍ عَالِي الْقَدْرِ وَعَظِيم الْجَاهِ ۞ صَلَاَةً تَجْمَعُ وَتَشْمُل وَتَفُوقُ وَتَفْضُلُ صَلَوَاتِ الْمُصَلِّيْن عَلَيْهِ مِنَ الْخَلْقِ أَجْمَعِيْن يَا الله ۞ صَلَاَةً فِي كُلِّ لَحْظَةٍ أَبَدَاً تُجْبَاهُ وتُهداه وَتَغْشَاهُ وَتَتَغَشَّاهُ ۞ عَدَدَ مَاعَلِمْت وَزِنَةَ مَا عَلِمْتَ وَمِلْءَ مَا علمت تِلْكَ الصَّلَاة ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيْمَاً لانِهايَة لِعَيْنِه وَلَا لِمعناه." },
        { t: "3. صلاة (فاتحة الوجود وسرّ السبع المثاني)", n: "﴿ الصلاةُ الثَّالِثة ﴾: اللَّهُمَّ صَلِّ بِمُقْتَضَى مُطْلَقِ كَمَالَات ۞ ومَعَانِي وَمَعْنَوِيَّاتِ وَلَوَازِمِ وَمُقْتَضَيَاتِ ۞ فَاتِحَةِ الْكِتَابِ وَالسَّبْعِ الْمَثَانِي وَالْقُرْآنِ الْعَظِيمِ الذَّات ۞ فِي كُلِّ لَحْظَةٍ أَبَدَاً عَلَى سَيِّدِنَا مُحَمَّدٍ فَاتِحَةِ الْمَوْجُودَاتِ ۞ بِالْعَيْنِ وَالْمَعْنَى والذَّات وَالصِّفَاتِ ۞ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيْماً." },
        { t: "4. صلاة (مواهب القرآن وعجائب البيان)", n: "﴿ الصَّلَاةُ الرَّابِعَة ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي كُلِّ لَحْظَةٍ أَبَدَاً ۞ عَدَدَ مَعَانِي وَمَعْنَوِيَّاتِ ۞ وَلَوَازِمِ وَمُقْتَضَيَاتِ ۞ وَمُطْلَقِ كمَالَاتِ تعَاليمِ الْقُرْآنِ وألفَاظِهِ وَحِفْظِهِ وَمَوَاهِبِه وَعَجَائِبِه وَغَرَائِبِهِ وَمُقَدَّرَاتِهِ وَإحَاطَتِهِ وَكَمَالَاتِهِ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيْماً." },
        { t: "5. صلاة (طيب الأعراق وكمال الأخلاق)", n: "﴿ الصَّلَاةُ الخَامِسَة ﴾: اللَّهُمَّ صَلِّ بِمُقْتَضَى عَيْنِ وَمَعْنَى الْإِطْلَاقِ ۞ صَلَاَةً ذَاتِيَّة الذات وَالصِّفَاتِ وَالْإشْراقِ ۞ عَلَى سَيِّدِنَا مُحَمَّدٍ أَسْبَقِ السُّبَّاقِ ۞ وَالْبَلْسَمِ التِّرْيَاقِ ۞ وَطَيِّبِ الْأَعْرَاقِ ۞ وَالطِّيْبِ المِعْبَاقِ ۞ وَمَصْدَرِ الْإِنْفَاقِ ۞ وَمُتَمِّمِ مَکَارمِ الْأَخْلَاقِ ۞ وَأَفْضَلِ الْخَلْقِ عَلَى الْإِطْلَاقِ ۞ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيْماً رَاقٍ بَاقٍ ۞ يَا مَلِكُ يَا خلَّاق." },
        { t: "6. صلاة (المصباح المشكاتي والنور الذاتي)", n: "﴿ الصَّلَاةُ السَّادِسَة ﴾: اللَّهُمَّ صَلِّ بِمُقْتَضَى كُلِّ كَمَالٍ ذَاتِيٍّ وَصِفَاتِيٍّ علی سیدنَا مُحَمَّدٍ النُّورِ الذَّاتِيِّ ۞ وَالْمِصْبَاحِ الْمِشْكَاتِي ۞ والْطُّورِ التَّجلياتِي ۞ صَلَاَةً تَفُوقُ وَتَفْضُلُ صَلَواتِ جَمِيعِ الْمُصَلِّيْن عَلَيْهِ فِي الْمَاضِي والحَالِ وَالْآتِي ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً مطلقاً ذاتي." },
        { t: "7. صلاة (الصلوات العلية في الحضرة المحمدية)", n: "﴿ الصَّلَاةُ السَّابِعَة ﴾: اللَّهُمَّ صَلِّ بِمُقْتَضَى كمَالَات ذَاتِكَ الْعَلِيَّةِ ۞ صَلَاَةً ذَاتِيَّةً ۞ عَلَى عَيْنِ وَمَعْنَى الذاتِ الْمُحَمَّدِيَّةِ ۞ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيْماً فِي كُلِّ وَقْتٍ وَحِينٍ وَبُكْرَةٍ وعَشِيَّة." },
        { t: "8. صلاة (شمس المحجة وبدر الدلجة)", n: "﴿ الصَّلَاةُ الثَّامِنَة ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ لِسَانِ الْحُجَّةِ ۞ وَشَمْسِ الْمَحَجَّةِ ۞ وبَدْرِيِّ الدُّلْجة ۞ وَدُرِّيِّ اللُّجَّةِ ۞ وَنَهَارِيِّ الْمُهْجَةِ ۞ وَوَهَّاجِ الْحِجَا ذِي الْبَهْجَةِ ۞ وَمُقِيمِ الْمِلَّةِ الْمُعْوَجَّةِ ۞ وَمَحَجِّ الْأَرْوَاحِ النَّاهِجَةِ نَهْجَه ۞ صَلَاَةً تَشْرَحُ بِهَا صُدُورَنَا الْمُرْتَجَّة ۞ وَتَمْلأ بِهَا قُلُوبَنَا نُوراً وَسُرُوراً وَبَهْجَة ۞ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيْماً." },
        { t: "9. صلاة (بحر الندى وجالي الصدى)", n: "﴿ الصَّلَاةُ التَّاسِعَة ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ بَدرِ الْهُدَى ۞ وَجَالِي الصَّدَى ۞ وَبَحْرِ النَّدَى ۞ وَسَيْلِ الجَدَا ۞ وَمُرْدِي الرَّدَى ۞ وَمَدِّ الْمَدَى ۞ وَتَبِّ الْعِدَا ۞ وَسَارِي النِّداء ۞ وَعَلَى آلِهِ فِي كُلِّ لَحْظَةٍ أَزَلاً وَأَبَدَاً ۞ وَكُنْ لَنَا بِهِ قَلْبَاً وَقَالَبَاً وَيَدَاً وَمُؤَيِّدَاً ۞ ومسعداً ومرشداً وَمُنْجِداً ۞ حَالاً وَأَبَدَاً ۞ وَسَلِّم تَسْلِيماً دَائِمَاً سَرْمَداً (يَا الله)." },
        { t: "10. صلاة (روح الأرواح ونضارة الوجوه الصباح)", n: "﴿ الصَّلَاةُ العَاشِرة ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ صُبْحِ الْمَصَابِيحِ النَّيِّرَةِ ۞ وَنَضَارَةِ الْوُجُوهِ الصَّبِيحَةِ الْمُسْفِرَةِ ۞ وَنَهَارِ الْإِطَاحَةِ بدياجِي لَيْلِ الْجَهَالَةِ الْجَائِرَةِ ۞ وَرُوحِ الْأَرْوَاحِ الرُّوحَانِيَّةِ الزَّكِيَّةِ الطَّاهِرَةِ ۞ وَنَفَسِ الْأَنْفَاسِ النَّفِيسَةِ الْعَاطِرَةِ ۞ وَقَلْبِ الْقُلُوبِ الْعَرْشِيَّةِ الْعَامِرَةِ ۞ الْمُنَوَّرَةِ الذَّاكِرَةِ ۞ الْحَامِدَةِ الشَّاكِرَةِ ۞ وَلُبِّ الْألْبَابِ الْمَغْشِيَّةِ بِنُورِ تَجَلِّيَاتِكَ الْبَاطِنَةِ وَالظَّاهِرَةِ ۞ وَقَالَبِ الْقَوَالِبِ الْمُقْبِلَةِ بِكَ عَلَيْكَ بِالسَّكِينَةِ والوقارِ ذاكِرةً مُتَذَكِّرَةً وَمُحِيطِ الأبحُرِ الزَّاخِرةِ بِالْعِلْمِ وَالْمَعْرِفَةِ السَّنِيَّةِ الْبَاهِرَةِ ۞ وبَرِّ المَبرَّاتِ الْحِسِّيَّة وَالْمَعْنَوِيَّةِ الْمُتَوَاتِرَةِ ۞ وَفَضَاءِ الْفَضْلِ الْعَظِيمِ الْوَاسِعِ لِلطَّائِعِينَ الطَّامِعِينَ مِنْكَ بِنَيْلِ الرِّضَى وَالْمَغْفِرَةِ ۞ وَسَيِّدِ أهْلِ السِّيَادَةِ السَّائِدَةِ الْبَاطِنَةِ منها والظَّاهرة ۞ فِي الدُّنْيَا وَالْبَرْزَخِ وَالْآخِرَةِ ۞ صَلَاَةً مُتَّصِلَةً مُتَوَاتِرَةً ۞ وَمُسْتَمِرَّةً مُتَضَافِرَةً ۞ صَلَاَةً تَفُوقُ وَتَفْضُلُ صَلَوَاتِ الْمُصَلِّيْنَ عَلَيْهِ الْآتِيَةِ مِنْهَا وَالْعَابِرَةِ ۞ صَلَاَةً تَهَبُ لَنَا بِهَا مَا وَهَبْتَهُ لِأَهْلِ حُبِّكَ الْأَزَلِيِّ الْأبَدِيِّ يَا مَالِكَ الدِّيْنِ وَالدُّنْيَا وَالْآخِرَةِ (آمین)." },
        { t: "11. صلاة (نور الهداية والغيث الهامع)", n: "﴿ الصَّلَاةُ الحَادِيَة عَشر ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ مَا نُورُهُ الْهَادِي سَطَع ۞ وَمَا ضِيَاءُ طَلْعَتِهِ شَع ۞ وَمَا فَجْرُهُ الصَّادِق طَلَع ۞ وَمَا ضَوْءُ نَهَارِهِ اِتَّسَعَ ۞ وَمَا عِلْمُه الذَّاتِيِّ نَفَع ۞ وَمَا صِدْقُهُ فِي الْقَلْبِ وَقَع وَمَاقَلْبٌ بِوَعْظِهِ خَشَعَ ۞ وَمَا لِسَانُهُ بِالْحَقِّ صَدَعَ ۞ وماغيثُ رَحْمَتِهِ هَمَعَ ۞ وَمَا الْمَاءُ مِنْ بَيْنِ أنَامِلِهِ الشَّرِيفَةِ نَبَع ۞ وَمَا عَلَيْكَ بِكَ مِنْ قَلْبٍ جَمَع ۞ وَمَا فِي ذَاتِهِ وَصِفَاتِهِ مِنَ الْأَسْرَارِ وَالْأَنْوَارِ اجْتَمَعَ ۞ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيْماً." },
        { t: "12. صلاة (معدن النبوة ومنبع الأصالة)", n: "﴿ الصَّلَاةُ الثَّانِيَة عَشر ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ مَعْدِنِ النُّبُوَّةِ وَالرِّسَالَةِ ۞ وَمَنْبَعِ الْعِلْمِ النَّافِعِ وَالْأَصَالَةِ ۞ وِجَالِي دياجي الْجَهْلِ وَالضَّلَالَةِ وَإِسْفَارِ صُبْحِ نَهَارِ الْجَلَالَةِ ۞ وَإشْرَاقِ شَمْسِ الْهُدَى وَالدَّلالَةِ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيْماً بِعَدَدِ كُلِّ مَعْلُومٍ لَكَ يَا الله." },
        { t: "13. صلاة (تعلقات الصفات الواجبة للذات)", n: "﴿ الصَّلَاةُ الثَّالِثَة عَشر ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي كُلِّ لَحْظَةٍ أبداً ۞ عَدَدَ مَعَانِي وَمَعنويَّات ۞ وَلَوَازِم وَمُقْتَضَيَاتِ ۞ وَمَطَالب وتعَلُّقاتِ عِلْمِ الذَّاتِ ۞ بِجَمِيع مَعَانِي وَمَعنويَّات ۞ وَلَوَازِم وَمُقْتَضَيَاتِ وَمَطَالب وتعَلُّقات الصِّفَاتِ الْوَاجِبَةِ لِلذَّاتِ ۞ صلاةً تَجْمَع وَتَشْمُل وَتَفُوقُ وَتَفْضُل صَلَوَاتِ جَمِيعِ الْمُصَلِّيْن عَلَيْهِ مِنَ الْمَخْلُوقَاتِ ۞ فِي الْمَاضِي والحَالِ وَالْآتِ ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسليمَاً ذاتي الذات." },
        { t: "14. صلاة (الوجود المطلق والحق المحقق)", n: "﴿ الصَّلَاةُ الرَّابِعَةِ عَشر ﴾: اللَّهُمَّ صَلِّ بِمُقْتَضَى كَمَالَاتِ الْوُجُودِ الْوَاجِبِ الْمُطْلَقِ فِي كُلِّ لَحْظَةٍ أبداً تَتَحَقَّق ۞ عَلَى سَيِّدِنَا مُحَمَّدٍ الْحَقِ ۞ صلاةً تَفُوْقُ وَتَفْضُل وَتجْمَعُ وَتَشْمُل صَلَوَاتِ جَمِيعِ الْخَلْقِ ۞ مِنْ أَوَّلِ أَيَّامِ الدُّنْيَا إلَى آخِرِ ذَلِكَ الْيَوْمِ الْحَقّ ۞ صلاةً لَا تَفْضُلُهَا صَلَاةُ أَحَدٍ مِنَ الْخَلْقِ ۞ فِيمَا مَضَى أو يلحق ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تسلیماً دائماً مُطْلَق." },
        { t: "15. صلاة (الجمال الباهر والوصف الأجمع)", n: "﴿ الصَّلَاةُ الخَامِسَةِ عَشر ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ ذِي القدْرِ العَلِي الْأَرْفَع وَالْجَاه الْعَظِيم الأوسَع ۞ والجَمالِ الْبَاهِر الأنْصَع ۞ وَالْحُسْنِ الْبَدِيع الْأَبْدَع ۞ والدَّلالِ المُدْهِش الْأَرْوَع ۞ وَالْوَصْفِ الْجَمِيلِ الأجْمَع ۞ وشَمْلَنَا بِشَمْلِهِ اجْمَع ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً." },
        { t: "16. صلاة (السراج المتوهج والكتاب الممنهج)", n: "﴿ الصَّلَاةُ السَّادِسة عَشر ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ البَدر المُتَبَلِّج ۞ وَالسِّرَاج المتَوَهِّج ۞ والبَحْر المُتَمَوج والسَّماءِ المتَأبْرِجِ ۞ وَاللَّيْلِ المُتَأبْلج والنَّهَار المُتأسْرج ۞ وَالْكِتَاب المُتَمنهج ۞ وَالرَّوْض المَتأريِج والفَجر المُتَأَفْرج وَالصُّبْح المتأبهج ۞ وَالْحَوْض المُتأثلج وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً فِي كُلِّ لَحْظَةٍ أزلاً وأبداً بِعَدَدِ كُلِّ مَعْلُومٍ لَك يَا اللَّه." },
        { t: "17. صلاة (كشف السجا وحبل الرجا)", n: "﴿ الصَّلَاةُ السَّابِعَة عَشر ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ بَدْرِ الدُّجَى وفُلْك النَّجى ونُورالحِجى ۞ ورمْزِالهجاء ۞ وَحَبْل الرَّجَا ۞ وَكَشْفِ السَّجَا وعَلَى آلِهِ ۞ صلاةً تَجْعَلُ لَنَا بِهَا مِنْ كُلِّ هَمٍّ وَغَمٍّ فَرَجَا ۞ وَمِنْ كُلِّ کرْب وَضَيْقٍ مَخْرَجاً ۞ وَمِنْ كُلِّ فَاحِشَةٍ نَجَا ۞ وتحَفظنَا بِهَا مِنْ كُلِّ سُوءٍ وَمَكْرُوهٍ ودُجى ۞ وَمِنْ كُلِّ مَشِيئَة سَخِيفَة هَوْجَاء وَسِيرَة سَيِّئَة عَوْجَاء ۞ وَسَلِّم تَسْلِيمَاً سَرمَدياً مُبْهَجَا ۞ ﴿آمین﴾." },
        { t: "18. صلاة (المقام المكرم والوجود الأقدم)", n: "﴿ الصَّلَاةُ الثَّامِنَة عَشر ﴾: اللَّهُمَّ صَلِّ بِمُطْلَق وَجُودِك الْوَاجِب الْأَتَمّ ۞ الْأَزَلِيّ الْأَقْدَم الْبَاقِي الْأَدْوَم ۞ الأَعَز الأجَل الْأَكْرَم ۞ الْعَلِيِّ الْعَظِيمِ الأعْظَمِ عَلَى سَيِّدِنَا مُحَمَّدٍ الْمُشَرَّف الْمُكَرَّم ۞ الْمُبَجَّل الْمُعَظَّم ۞ فِي كُلِّ لَحْظَةٍ أبداً تُذْكر وتُعلم ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً دائماً أتم." },
        { t: "19. صلاة (جوهر الألباب وطب القلوب)", n: "﴿ الصَّلَاةُ التَّاسِعةِ عَشر ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ مَصْدَرِ الْخَيْر وَالْإِنْعَام ومظهر الفضْل وَالْإِكْرَام ۞ وجوهَر الأرواح وَالْأَجْسَام ۞ ودُرة الألْبَاب وَالأفْهَام ۞ ووثقَى عُرَى الإعْتِصَام ۞ وجَالِي دَياجِي الظَّلَام ۞ وَطِبّ الْقُلُوب السِّقَام ۞ وَبَدْرِ الْهُدَى الْمُسْتَدَام ۞ وَشَمْس الْهُدَاة الْكِرَام ونِيْل نَيْلِ الْمَرَام ۞ وَأَهْدَى هُدَاةِ الْأَنَام وَأَرْعَى رُعَاة الذِّمَام ۞ وَأدعَى دُعَاة السَّلَام ۞ وَأَوْفَى الوُفاة الفِخام وعَلَى آلِهِ وَصَحْبِهِ فِي كُلِّ لَحْظَةٍ أبداً عَلَى الدَّوَام ۞ بِلَا انْقِضَاء وَلَا انْصِرَام ۞ وَسَلِّم تَسْلِيمَاً كثيراً ياذا الجَلالِ والإكرَام." },
        { t: "20. صلاة (الزهراء البتول وآل الرسول)", n: "﴿ الصَّلَاةُ الْعِشْرُون ﴾: اللَّهُمَّ صَلِّ صلاةً ذَاتِيَّةَ الْمَعْنَى وَالْعَيْن ۞ وَمَنْفِيَّةَ الإِنْتِفَاء وَالْكَمِّ وَالْكَيْف والأين ۞ فِي كُلِّ لَمْحَة وَنَفَسٍ وَطَرْفَةِ عَيْن عَلَى سَيِّدِنَا مُحَمَّدٍ الْمَلِيح الزَّيْن ۞ وعَلَى فَاطِمَة الزَّهْرَاء ۞ وَخَدِيجَة الْكُبْرَى ۞ وَعَلِي الْمُرْتَضَى ۞ وَالْحَسَن وَالْحُسَيْن ۞ وَسَلِّم تَسْلِيمَاً وَألْحِقْنَا بِهِمْ فِي الدارين." },
        { t: "21. صلاة (أصل الموجودات والمعاني الأبدية)", n: "﴿ الصَّلَاةُ الوَاحِدة وَالْعِشْرونْ﴾: اللَّهُمَّ صَلِّ بِمُقْتَضَى كَمَالَات الذَّاتِ الإِلَهِيَّةِ ۞ الْمُنَزَّهَةِ عَنِ الَكَمِّ وَالْكَيْفِ والأَيْنِيَّة ۞ صَلاةً ذَاتِيَّةَ الذَّاتِ وَالصِّفَاتِ وَالْمَعَانِي وَالْمَعْنَوِيَّةِ ۞ عَلَى سیدنا مُحَمَّدٍ أَصْل جَمِيع الْمَوْجُودَاتِ الْكَوْنِيَّة ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً بِالْمَعَانِي الأبدية." },
        { t: "22. صلاة (سرّ الجلالة والنجاة من الجهالة)", n: "﴿ الصَّلَاةُ الثَّانِيَة وَالْعِشْرونْ ﴾: اللَّهُمَّ صَلِّ بِمُقْتَضَى كَمَالَات عَيْن وَمَعْنَى إسْمِ الْجَلَالَةِ فِي كُلِّ لَمْحَةٍ وَنَفَسٍ وَلَحْظَةٍ وَخطْرةٍ وَحَالَةٍ ۞ إلَى مَا لانِهايَة لَهُ وَلَا إحَالَةٍ ۞ عَلَى سَيِّدِنَا مُحَمَّدٍ الْمُنْقِذِ الْعَظِيمِ مِن الْجَهَالَةِ وَالضَّلالَة ۞ صلاةً تَفُوْقُ وَتَفْضُل صَلَوَات الْمُصَلِّيْن عَلَيْهِ فِي الْمَاضِي والحَالِ وَالْآتِ بِحُكْمِ الْأَصَالَةِ ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً بِدَوَام إسْم الجَلَالة." },
        { t: "23. صلاة (أهل الإرث وسرّ الفيض النبوي)", n: "﴿ الصَّلَاةُ الثَّالِثةِ وَالْعِشْرونْ ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي كُلِّ لَحْظَةٍ أبداً ۞ صلاةً تُعَادِل وتُمَاثِل ۞ فِي الْعَاجِلِ وَالْآجِلِ ۞ صَلَوَات أَهْل الْإِرْث النَّبَوِيّ ۞ الْحِسي وَالْمَعْنَوِي ۞ السَّنِي وَالْأَسْنَوِيّ ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً مِثْلَ ذَلِكَ كُلِّهِ يَا مَلِكُ يَا قوي." },
        { t: "24. صلاة (جامعة الأوقات ومحيطة الصلوات)", n: "﴿ الصَّلَاةُ الرَّابِعَة وَالْعِشْرونْ ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي كُلِّ لَحْظَةٍ أبداً ۞ عَدَدَ مَعَانِي وَمَعنويَّات ۞ وَلَوَازِم وَمُقْتَضَيَاتِ ۞ وَمُطْلَق كَمَالاَت ۞ ماصليت بِهِ عَلَيْهِ بِالذَّات ۞ صَلاةً ذَاتِيَّة الذَّات وَالصِّفَات ۞ وَالْمَعَانِي والمَعْنَوِيَّاتِ ۞ صَلاةً تَجْمَع وَتَشْمُل ۞ وَتَفُوقُ وَتَفْضُل وتعدِل ۞ صَلَوَاتِ جَمِيعِ الْمَخْلُوقَاتِ ۞ فِي جَمِيعِ الْأَزْمِنَةِ وَالْأَوْقَات ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً مِثْلَ ذَلِكَ كُلِّهِ بِالْعَيْن وَالْمَعْنَى والذات." },
        { t: "25. صلاة (مقام القطبية وأسرار الغوثية)", n: "﴿ الصَّلَاةُ الخَامِسَة وَالْعِشْرونْ ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي كُلِّ لَحْظَةٍ أَبَدِيَّةٍ ۞ صلاةً تُعَادِل وَتُمَاثِل صَلَوَاتِ أهْلِ مَقَام القُطْبية الْعُظْمَى والغوْثِية ۞ الْعَيْنِيَّة وَالْمَعْنَوِيَّة ۞ الذَّاتِيَّة والصِّفَاتية ۞ الْقَوْلِيَّة وَالْفِعْلِيَّة ۞ الكَسْبِيَّة والوهْبِية ۞ الْقَبْلِيَّة وَالحالِيَّة وَالْبَعْدِيَّة ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً مِثْلَ ذَلِكَ كُلِّهِ." },
        { t: "26. صلاة (نورانية الذات والكلمات التامات)", n: "﴿ الصَّلَاةُ السَّادِسَة وَالْعِشْرونْ ﴾: اللَّهُمَّ صَلِّ بِمُقْتَضَى كَمَالَات وَمَعَانِي وَمَعنويَّات ۞ وَلَوَازِم وَمُقْتَضَيَاتِ ۞ الْكَلِمَات التَّامَّات ۞ وَالْبَاقِيَات الصَّالِحَات الْمُبَارَكَات ۞ والصَّلَوَات الطَّيِّبَات ۞ فِي الحَال وَالْمَاضِي والآت ۞ عَلَى سَيِّدِنَا مُحَمَّدٍ نُورَانِيِّ الذَّات ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً مُسْتَمِرّ الذَّات ۞ عَلَى مَدَى الأوقات." },
        { t: "27. صلاة (تاج المفاخر وسرّ السرائر)", n: "﴿ الصَّلَاةُ السَّابِعة وَالْعِشْرونْ ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ تَاج الْمَفَاخِر ۞ وَفَخْر الأفاخر ۞ وذخر الذخائر ۞ ونور السرائر ۞ وَبَحْر المَوَاخِر ۞ وَمُحِيط اللُّؤلُؤ وَالْمَرْجَان وَالدُّرَرِ وَالْجَوَاهِر ۞ وأطلس السِّرّ الْإِلَهِيّ السَّارِي فِي السَّرَائِر وَالضَّمَائِر ۞ وَمَجْمَع الأبْحُرِ الزَّوَاخر ۞ مِنْ أَهْلِ الْعِلْمِ الْبَاطِنِ وَالظَّاهِرِ ۞ وَسُلْطَان الْأَوَائِلِ وَالْأَوَاخِرِ ۞ وبَدر بوَاطِن الْقُلُوب الطَّوَاهر ۞ وَشَمْس الْمَظَاهِر وَالظَّوَاهِر ۞ ونَهار الحقِّ الْمُبِين الظَّاهِر ۞ وَلَيْلِ وَصْلِ الْوَاصِلِين الموصِّلين بِهِ إلَى الْأَوَّلِ الْآخِرِ ۞ الْبَاطِنِ الظَّاهِر ۞ وَبُرْهَان الْأَذْهَان المُبرهِنة عَلَى وُجُودِ وَاجِبِ الْوُجُودِ الْقَاهِر ۞ بِالْبَرَاهِين الْجَلِيَّةِ البَوَاهر ۞ للمبصَّرين المُبصِرين بِأنْظَار الْأَبْصَار وَأَعْيُنِ الْبَصَائِر ۞ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً يَا أَوَّل يَا آخِر ۞ يَا بَاطِن يَا ظاهر." },
        { t: "28. صلاة (حروف الأسماء وأعداد الكمالات)", n: "﴿ الصَّلَاةُ الثَّامِنَة وَالْعِشْرونْ ﴾: اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ فِي كُلِّ لَحْظَةٍ أبداً ۞ عَدَدَ جَمِيع الْحُرُوفِ وَالْأَسْمَاء وَالْكَلِمَات ۞ مِنْ يَوْمِ خَلْقِ الأَرْضِ والسماوات ۞ إلَىٰ مَا لَا يَعْلَمُهُ إلَّا أَنْتَ بِالذَّات ۞ وَعَدَدَ جَمِيعِ مَعَانِي وَمَعنويَّات ۞ وَلَوَازِم ومُقْتَضَيَاتِ ۞ جَمِيعِ تِلْكَ الْحُرُوفِ وَالْأَسْمَاء وَالْكَلِمَات ۞ وَعَدَدَ جَمِيعِ أعْدَادِها الرَّقْمِيَّة وَضَرْب جَمِيعِهَا فِي نَفْسِهَا فِي كُلِّ لَحْظَةٍ أبداً إلَىٰ مَا لَا نِهَايَةَ لَهُ ولاغاية مِنَ الْغَايَاتِ ۞ صلاةً تَفُوق وَتَفْضُل جَمِيعِ الصَّلَوَاتِ ۞ كَفَضْل ذَاتِك عَلَى جَمِيع الذوات." },
        { t: "29. صلاة (العهود الوفية والصلوات الأزلية)", n: "﴿ الصَّلَاةُ التَّاسِعة وَالْعِشْرونْ ﴾: اللَّهُمَّ صَلِّ صلاةً أَزَلِيَّةً أَبَدِيَّة الْوُجُود ۞ وَمَنْفِيَّة الْبِدَايَةِ وَالنِّهَايَةِ وَالْقُيُود ۞ عَلَى سَيِّدِنَا مُحَمَّدٍ الْحَامِد الْمَحْمُود ۞ صَلاةً تَفُوْق وَتَفْضُل وَتَسْوْد ۞ صَلَوَاتِ جَمِيعِ الذَّوَاتِ الْمُمْكِنَة الْوُجُود ۞ مِنْ أَهْلِ عَالَمِ الْغَيْبِ وَمِنْ أَهْلِ الْعَالم الْمَشْهُود ۞ مِنْ أَوَّلِ الدُّنْيَا إلَى الْيَوْمِ الْمَوْعُود ۞ وعَلَى آلِهِ وَصَحْبِهِ المُوفين بِالْعُهُود ۞ وَسَلِّم تَسْلِيمَاً مِثْلَ ذَلِكَ كُلِّهِ يَا بَر يارحيم يَا ودود." },
        { t: "30. صلاة (أوجب الصلوات وأقربها)", n: "﴿ الصَّلَاةُ الثَّلَاثُون ﴾: اللَّهُمَّ صَلِّ بِوَاجِبِ الصَّلَوَاتِ وَأَوْجَبِهَا ۞ وَمَكْتُوبِهَا وَأكْتَبِهَا ۞ وَمَحْبُوبِهَا وَأحَبِّهَا ۞ وَمَنْدُوبِهَا وَأنْدبِهَا ۞ وطِبِّهَا وطَيِّبِهَا ۞ وَمُنَاسِبِهَا وَأنْسَبِهَا ۞ وَمَحْسُوبِهَا وَأحْسَبِهَا ۞ وَغَرِيبِهَا وَأَغْرَبِهَا ۞ وَعَجِيبِهَا وَأَعْجَبِهَا ۞ وَمَرْغُوبِها وَأَرْغَبِهَا ۞ وعَذْبِهَا وَأَعْذَبِهَا ۞ وَصَوَابِهَا وَأَصْوَبِهَا ۞ وَسَيْبِهَا وَأسْيَبِهَا ۞ وَقَرِيبِهَا وَأقْرَبِهَا ۞ وَطِيْبِهَا وَأَطْيَبِهَا ۞ وصَيِّبها وَأصْيبِهَا ۞ عَلَى سَيِّدِنَا مُحَمَّدٍ عَدَدَ مَعَانِي وَمَعنويَّات وَلَوَازِمِ ومُقْتَضَيَاتِ وَمَطَالِبِ وَتَعَلُّقَاتِ الصِّفَاتِ الْوَاجِبَةِ لِلذَّاتِ ۞ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيْماً مِثْلَ ذَلِكَ بِالذَّات." },
        { t: "31. صلاة (أزهر الأنوار وأبهى الأسرار)", n: "﴿ الصَّلَاةُ الواحِدة والثَّلَاثُون ﴾: اللَّهُمَّ صَلِّ بِخَیْرِ الصَّلَوَاتِ وَأخْيَرِهَا ۞ وَنَيِّرهَا وَأَنْوَرِهَا ۞ وَزَاهِرِهَا وَأَزْهَرِهَا ۞ وَبَاهِرِهَا وأبهرِها ۞ وزاخرها وأزخرِها ۞ وَفَاخِرِهَا وَأَفْخَرِهَا ۞ وَظَاهِرِهَا وَأَظْهَرِهَا ۞ وَمَسْتُورِهَا وَأَسْتَرِهَا ۞ ونَضِيرِها وأنْضَرِها ۞ وَنَهَارِهَا وَأنْهَرِهَا ۞ وَقَاهِرِهَا وَأَقْهَرِهَا ۞ وَكَبِيرِهَا وَأكْبَرِهَا ۞ وَمَبْرُورِهَا وَأبَرِّهَا ۞ وَكَثِيرِهَا وَأَكْثَرِهَا ۞ وَعَبِيرِهَا وَأعْبَرِهَا ۞ وَحَاضِرِهَا وَأحْضَرِهَا ۞ وَجَدِيرِهَا وَأَجْدَرِهَا ۞ وَوَافِرِهَا وَأَوْفَرِهَا ۞ وَسِرِّهَا وَأسَرِّهَا ۞ وَعاطِرِها وأعطرِها ۞ وَمَذْكُورِهَا وَأذْكَرِهَا ۞ ومُسفِرِها وأسْفَرِها ۞ وَغُرَرِهَا وأغَرِّها ۞ وَشَهِيرِهَا وَأَشْهَرِهَا ۞ عَلَى سَيِّدِنَا محمد عدد مَعَانِي وَمَعنويَّات وَلَوَازِمِ ومُقْتَضَيَاتِ وَمَطَالِبِ وَتَعَلُّقَاتِ الصِّفَاتِ الْوَاجِبَةِ لِلذَّاتِ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيْماً مِثْلَ ذَلِكَ بِالذَّات." },
        { t: "32. صلاة (أبدع الصلوات وأجمعها)", n: "﴿ الصَّلَاةُ الثَّانِيَة والثَّلَاثُون ﴾: اللَّهُمَّ صَلِّ بِبَدِيع الصَّلَوَات وأَبْدَعِها ۞ وَجَامِعِهَا وَأَجْمَعِهَا ۞ ورفيعها وَأَرْفَعِهَا ۞ ونافِعِهَا وَأَنْفَعِهَا ۞ وواسعها وَأَوْسَعِهَا ۞ ورائعها وأروعِها ۞ ويانعها وأينعِها ۞ وساطعها وأسْطَعِها ۞ ومُشِعِّهَا وأشَعِّها ۞ ومَنِيْعِهَا وَأَمْنَعِهَا ۞ وناصِعهَا وأنصَعهَا ۞ وهامِعِهَا وأهْمَعِهَا ۞ وسرَيعِهَا وأسرَعِهَا ۞ ولامِعِهَا وألمَعِهَا ۞ عَلَى سَيِّدِنَا مُحَمَّدٍ عَدَدَ مَعَانِي وَمَعنويَّات وَلَوَازِم ومُقْتَضَيَاتِ وَمَطَالب وتعَلُّقات الصِّفَاتِ الْوَاجِبَةِ لِلذَّاتِ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً مِثْلَ ذَلِكَ بالذات." },
        { t: "33. صلاة (أسمى التجليات وأنمى الصلوات)", n: "﴿ الصَّلَاةُ الثَّالثة والثَّلَاثُون ﴾: اللَّهُمَّ صَلِّ بسامي الصَّلَوَات وَأَسْمَاهَا ۞ وناميها وأنماها ۞ وهاميها وأهماها ۞ وطَامِيها وأطماها ۞ وَجَلِيلِهَا وَأَجَلِّهَا ۞ وَجَمِيلِهَا وَأجْمَلِهَا ۞ وشاملها وأشملها ۞ وكاملها وَأكْمَلِهَا ۞ وواصلها وَأَوْصَلِهَا ۞ وطَوِيلِها وأطولِهَا ۞ ومَعقُولِهَا وأعقلِهَا ۞ وفاضِلهَا وَأَفْضَلِهَا ۞ ومَبْذُولِهَا وأبذَلِهَا ۞ وعاجِلِهَا وأَعْجَلِهَا ۞ وَمَعْمُولِهَا وَأَعْمَلِهَا ۞ ومَقْبُولِهَا وَأقْبَلِهَا ۞ عَلَى سَیدنا مُحَمَّدٍ عَدَدَ مَعَانِي وَمَعنويَّات وَلَوَازِم وَمُقْتَضَيَاتِ وَمَطَالب وتعَلُّقات الصِّفَاتِ الْوَاجِبَةِ لِلذَّاتِ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً مِثْلَ ذَلِكَ بالذات." },
        { t: "34. صلاة (أصدق الوفاق وأوثق الميثاق)", n: "﴿ الصَّلَاةُ الرابِعة والثَّلَاثُون ﴾: اللَّهُمَّ صَلِّ بِحَق الصَّلَوَات وَأَحَقِّهَا ۞ ولائِقِهَا وألْيَقِهَا ۞ وَأَنِيقِهَا وأَنْيَقِهَا ۞ وسَابِقِهَا وأسْبَقِهَا ۞ وَلَاحِقِهَا وَألْحَقِهَا ۞ وشَارِقِهَا وأشْرَقِهَا ۞ ومُغْدَقِهَا وأغدقِهَا ۞ وواثقِهَا وأوثقِهَا ۞ ودِهَاقِهَا وأدهقِهَا ۞ وعَرِيقها وأعرقِهَا ۞ وعميقها وَأَعْمَقِهَا ۞ ودَقِيقِها وَأَدَقِّهَا ۞ ووِفَاقِها وَأَوْفَرِهَا ۞ وَمَعْشُوقِهَا وَأَعْشَقِهَا ۞ ومَشُوقِهَا وأشْوقِهَا ۞ وَمُطْلَقِهَا وَأَطْلَقِهَا ۞ ومُبْرِقِهَا وأَبْرَقِهَا ۞ وَنَسَقِها وأنْسَقِهَا ۞ وعابقها وأعبقِهَا ۞ ودافقها وأدفقِهَا ۞ علی سیدنا مُحَمَّدٍ عَدَدَ مَعَانِي وَمَعنويَّات وَلَوَازِم وَمُقْتَضَيَاتِ وَمَطَالب وتعَلُّقات الصِّفَاتِ الْوَاجِبَةِ لِلذَّاتِ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً مِثْلَ ذَلِكَ بالذات." },
        { t: "35. صلاة (أمتن الحصون وأعز المخزون)", n: "﴿ الصَّلَاةُ الخَامِسَة والثَّلَاثُون ﴾: اللَّهُمَّ صَلِّ بِحَسَنِ الصَّلَوَاتِ وَأَحْسَنِهَا ۞ وَمَتِينِهَا وأمتَنِها ۞ وَمَكِينِهَا وَأَمْكَنِهَا ۞ وَعُيُونِهَا وَأعْيَنِهَا ۞ وَمُتْقَنِهَا وَأَتْقَنِهَا ۞ وَمَضْمُونِهَا وَأضْمَنِهَا ۞ وَمَصُونِهَا وَأَصْونِهَا ۞ وَمَخْزُونِهَا وَأخْزَنِهَا ۞ وَثَمِينِهَا وأثْمنِهَا ۞ وَزَيْنِهَا وَأزْيَنِهَا ۞ وَبَيِّنِهَا وَأبْيَنِهَا ۞ وَمَسْنُونِهَا وأسَنِّها ۞ عَلَى سَيِّدِنَا مُحَمَّدٍ عَدَدَ مَعَانِي وَمَعنويَّات وَلَوَازِمِ وَمُقْتَضَيَاتِ وَمَطَالِبِ وَتَعَلُّقَاتِ الصِّفَاتِ الْوَاجِبَةِ لِلذَّاتِ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيْماً مِثْلَ ذَلِكَ بِالذَّات." },
        { t: "36. صلاة (أريج الأنفاس وبلوغ المعراج)", n: "﴿ الصَّلَاةُ السَّادسِة والثَّلَاثُون ﴾: اللَّهُمَّ صَلِّ بأرِيج الصَّلَوَات وَأَرْيَجِهَا ۞ وَثَجَّاجِهَا وَأَثَجِّهَا ۞ وَوَهَّاجِهَا وَأوْهَجِهَا ۞ ومُسْرَجِهَا وَأسْرَجِهَا ۞ وَعَارِجِهَا وَأعْرَجِهَا ۞ وَمَوْجِهَا وَأمْوَجِهَا ۞ وَبَلْجَائِهَا وأبْلَجِهَا ۞ عَلَى سَيِّدِنَا مُحَمَّدٍ عَدَدَ مَعَانِي ومعنویات وَلَوَازِم ومُقْتَضَيَاتِ ومطالب وتعَلُّقات الصِّفَاتِ الْوَاجِبَةِ لِلذَّاتِ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّمَ تَسليماً مِثْلَ ذَلِكَ بِالذَّات." },
        { t: "37. صلاة (أتم النجوم وأحكم المرقوم)", n: "﴿ الصَّلَاةُ السَّابِعَة والثَّلَاثُون﴾: اللَّهُمَّ صَلِّ بِهَامِّ الصَّلَوَاتِ وَأَهَمِّهَا ۞ وَقَدِيمِهَا وأقدمِهَا ۞ ودائِمِهَا وَأَدْوَمِهَا ۞ وعظيمِهَا وَأَعْظَمِهَا ۞ وَكَرِيمِهَا وأكرمِهَا ۞ وَلَازِمِهَا وَألْزَمِهَا ۞ وَتَمَامِهَا وَأَتَمِّهَا ۞ ومَعْلومِهَا وَأَعْلَمِهَا ۞ وَمَفْهُومِهَا وأفهمِهَا ۞ ومُعْجَمِهَا وأعجمِهَا ۞ ونُجُومِهَا وأَنْجَمِهَا ۞ وَمَرْكُومِهَا وأركمِهَا ۞ ومحتومِهَا وأحتَمِهَا ۞ ومختومِهَا وأختَمِهَا ۞ وجمِّهَا وأجمِّهَا ۞ وكمِّهَا وأكمِّهَا ۞ وَعُمُومِهَا وَأَعَمِّهَا ۞ وَمَرومِهَا وأرْوَمِهَا ۞ ومُحكمِهَا وَأَحْكَمِهَا ۞ ومرقومِهَا وأرقَمِهَا ۞ عَلَى سَيِّدِنَا مُحَمَّدٍ عَدَدَ مَعَانِي وَمَعنويَّات ۞ وَلَوَازِم ومُقْتَضَيَاتِ وَمَطَالب وتعَلُّقات الصِّفَاتِ الْوَاجِبَةِ لِلذَّاتِ وعَلَى آلِهِ وَصَحْبِهِ وَسَلِّم تَسْلِيمَاً مِثْلَ ذَلِكَ بالذات." }
    ];

    const contentArea = document.getElementById('content-area');

    prayers.forEach((p, index) => {
        const i = index + 1;
        const card = document.createElement('div');
        card.className = 'prayer-card';

        card.innerHTML = `
            <div class="title-box">
                <div class="prayer-title">${p.t}</div>
            </div>
            <div class="prayer-text">${p.n}</div>
            <div class="image-container">
                <img src="S${i}.png" class="prayer-image" alt="${p.t}" onerror="this.parentElement.innerHTML='<p style=\'color:#999\'>[صورة الصلاة رقم ${i}]</p>'">
            </div>
        `;
        contentArea.appendChild(card);
    });
</script>

</body>
